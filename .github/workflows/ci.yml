name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: 3.x

      - uses: actions/setup-node@v7
        with:
          node-version: 24.x

      - run: npm ci

      - uses: pre-commit/action@v3.0.1
